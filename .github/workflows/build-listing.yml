name: Build Repo Listing

on:
  workflow_dispatch:
    inputs:
      release-state-hash:
        description: >-
          Internal: set by the Detect Package Releases workflow. The release
          state is recorded as "seen" only after a successful deploy, so a
          failed build is retried on the next check.
        required: false
        default: ''
  # Allow a linked package repository to rebuild the listing instantly on
  # release (see "Instant updates on release" in the README).
  repository_dispatch:
    types: [package-released]
  push:
    branches: main
    paths: source.json

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  
# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true
  
env:
  listPublishDirectory: Website
  pathToCi: ci

jobs:
  
  build-listing:
    name: build-listing
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      
      - uses: actions/checkout@v4 # check out this repo
      - uses: actions/checkout@v4 # check out automation repo
        with:
          repository: vrchat-community/package-list-action
          path: ${{env.pathToCi}}
          clean: false # otherwise the local repo will no longer be checked out
          
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{env.pathToCi}}/.nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj') }}
          
      - name: Build Package Version Listing
        run: ${{env.pathToCi}}/build.cmd BuildMultiPackageListing --root ${{env.pathToCi}} --list-publish-directory $GITHUB_WORKSPACE/${{env.listPublishDirectory}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{env.listPublishDirectory}}
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Record the release state as "seen" for the release detector, but only
      # now that the deploy has succeeded. This step is skipped on failure
      # (no `if: always()`), so a broken build is retried on the next check.
      - name: Record built release state
        if: ${{ inputs.release-state-hash != '' }}
        run: echo "${{ inputs.release-state-hash }}" > release-state.txt

      - name: Save release state cache
        if: ${{ inputs.release-state-hash != '' }}
        uses: actions/cache/save@v4
        with:
          path: release-state.txt
          key: vpm-release-state-${{ inputs.release-state-hash }}