name: Detect Package Releases

# Watches the repositories listed in `source.json` (`githubRepos`) and
# rebuilds the VPM listing automatically whenever any of them publishes a
# new release. The listing build (build-listing.yml) always pulls the
# latest releases, so we only need to (re)trigger it when something changed.

on:
  schedule:
    # Check every 6 hours for new releases in the linked repositories.
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write # required to trigger the build-listing workflow

concurrency:
  group: detect-release
  cancel-in-progress: false

jobs:
  detect:
    name: detect-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest releases
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repos=$(jq -r '.githubRepos[]?' source.json)
          if [ -z "$repos" ]; then
            echo "No githubRepos defined in source.json, nothing to watch."
            echo "hash=empty" >> "$GITHUB_OUTPUT"
            : > release-state.txt
            exit 0
          fi

          : > release-state.txt
          for repo in $repos; do
            tag=$(gh release view --repo "$repo" --json tagName --jq .tagName 2>/dev/null || echo "none")
            echo "${repo}=${tag}" >> release-state.txt
          done

          echo "Current release state:"
          cat release-state.txt
          hash=$(sha256sum release-state.txt | cut -d' ' -f1)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Check for previously seen state
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: release-state.txt
          key: vpm-release-state-${{ steps.state.outputs.hash }}

      - name: Trigger listing build
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "New release(s) detected — rebuilding the VPM listing."
          gh workflow run build-listing.yml --ref ${{ github.ref_name }}

      - name: Remember current state
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: release-state.txt
          key: vpm-release-state-${{ steps.state.outputs.hash }}

      - name: Up to date
        if: steps.cache.outputs.cache-hit == 'true'
        run: echo "No new releases since the last check — listing is up to date."
